name: harkai
description: "An innovative security app created by citizens, designed to empower and protect communities by providing tools and resources that prioritize the safety and well-being of everyone. Built with a deep understanding of local needs, this app fosters collaboration, communication, and trust among neighbors, ensuring a safer environment for all."
publish_to: 'none'

version: 2.1.5+1

environment:
  sdk: ^3.5.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^3.13.1
  firebase_auth: ^5.5.4
  firebase_vertexai: ^1.7.0
  google_sign_in: ^6.3.0
  cloud_firestore: ^5.6.8
  google_maps_flutter: ^2.12.2
  google_fonts: ^6.2.1
  fluttertoast: ^8.2.12
  url_launcher: ^6.3.1
  permission_handler: ^11.3.1
  flutter_dotenv: ^5.2.1
  google_generative_ai: ^0.4.6
  geolocator: ^13.0.1
  geocoding: ^3.0.0
  location_geocoder: ^1.0.5
  flutter_google_maps_webservices: ^1.1.1
  shared_preferences: ^2.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: "^0.14.1"

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 23 # android min sdk min:16, default 21
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/icon/icon.png"

flutter:
  uses-material-design: true

  assets:
  - assets/images/background.png
  - assets/images/logo.png
  - assets/images/google_logo.png
  - assets/images/bot.png
  - assets/images/car.png
  - assets/images/dog.png
  - assets/images/fire.png
  - assets/images/theft.png
  - assets/images/alert.png
  - assets/icon/icon.png
  - .env
